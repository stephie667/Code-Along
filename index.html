<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Simple To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="main-container">
    <h1>Daily Tasks</h1>
    <p>Organize your day and stay productive!</p>

     <div class="content-wrapper">
      <div class="form-box">
        <h3>Add a New Task</h3>
        <form id="new-task-form">
          <div class="input-group">
            <label>What needs to be done?</label>
            <input type="text" id="new-task-desc" placeholder="e.g. Finish Moringa Assignment" required>
          </div>
          <button type="submit" id="add-btn">Add to List</button>
        </form>
      </div> 

    <div class="list-box">
        <h3>My List</h3>
        <hr>
        <ul id="tasks-display">
          </ul>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
