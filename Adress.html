<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adress Book</title>
    <link rel="stylesheet" href="Adress.css"> 
</head>
<body>
    <div class=" main-conctainer">
        <h1>My Contacts</h1>
    </div>

    <div class="content">
        <div class="form-box">
            <h3> Add a New Friend</h3>

            <form id="new contact form">
                <div class="Input-group">
                    <label>First Name:</label>
                    <input type="text" id="first-name"  placeholder="First Name" required>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" id="last name" placeholder="Last Name" required>
                 </div>
                 <div class="input-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone number" placeholder="Phone Number" required>
                </div>

                <button type="Submit" id="save-btn"><strong>Save Contact</strong></button>
            </form>
        </div>
        <div class="list-box">
            <h3>All My Contacts</h3>
            <ul id="display-list"></ul>
        </div>
    </div>
    
</body>
